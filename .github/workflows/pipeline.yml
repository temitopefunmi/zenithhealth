name: Zenith Health - Production Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:

      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Login to Azure (OIDC)
      # -----------------------------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Terraform Setup
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="resource_group_name=rg-zenith-mgmt"

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      # -----------------------------
      # Node / Next.js Build
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build App
        run: npm run build

      # -----------------------------
      # Prepare Standalone Build
      # -----------------------------
      - name: Prepare Standalone Deployment
        run: |
          echo "Preparing standalone build..."
          cp -r public .next/standalone/public || true
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cp package.json .next/standalone/
          cp .next/required-server-files.json .next/standalone/.next/ || true
          
          echo "Verifying server.js exists in standalone folder:"
          ls -F .next/standalone | grep server.js

      # -----------------------------
      # Zip Package
      # -----------------------------
      - name: Create Deployment Zip
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      # -----------------------------
      # Deploy to Azure Web App
      # -----------------------------
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_NAME }}
          package: deploy.zip