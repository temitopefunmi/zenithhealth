name: Zenith Health - Production Pipeline

on:
  push:
    branches: [main]
    # 🎯 Added Path Filtering to save time
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'package*.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      # 🔐 This allows Terraform to pass the app_name variable automatically
      TF_VAR_app_name: ${{ vars.APP_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1️⃣ LOGIN
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect OpenAI account
        id: check_account
        run: |
          ACCOUNT_NAME=$(az cognitiveservices account list \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?kind=='OpenAI'].name" -o tsv)

          if [ -z "$ACCOUNT_NAME" ]; then
            echo "account_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No OpenAI account found yet. Skipping model check."
          else
            echo "account_exists=true" >> $GITHUB_OUTPUT
            echo "account_name=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
          fi
      - name: Verify model availability
        if: steps.check_account.outputs.account_exists == 'true'
        run: |
          MODEL_NAME="${{ vars.MODEL_NAME }}"
          ACCOUNT_NAME="${{ steps.check_account.outputs.account_name }}"

          MODEL_FOUND=$(az cognitiveservices account list-models \
            --name $ACCOUNT_NAME \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?name=='$MODEL_NAME'].name" -o tsv)

          if [ -z "$MODEL_FOUND" ]; then
            echo "❌ Model $MODEL_NAME not available"
            exit 1
          fi

          echo "✅ Model is available"

      # 2️⃣ INFRASTRUCTURE
      # Compile Bicep to JSON so Terraform can find it
      - name: Compile Bicep
        run: az bicep build --file ./scripts/sql_db.bicep --outfile ./terraform/sql_db.json
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init 
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="resource_group_name=rg-zenith-mgmt" \
            -backend-config="key=terraform.tfstate"
      
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan 
          terraform show -no-color tfplan > plan.txt

      - name: Show Terraform Plan
        run: |
          echo "### Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat terraform/plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Highlight Changes
        run: |
          echo "### Key Changes" >> $GITHUB_STEP_SUMMARY
          grep -E "^\s*[\+\-\~]" terraform/plan.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      TF_VAR_app_name: ${{ vars.APP_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="resource_group_name=rg-zenith-mgmt" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply tfplan
          

      # 3️⃣ BUILD (Standard Next.js Build)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      # 4️⃣ DEPLOY
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_NAME }}
          package: deploy.zip