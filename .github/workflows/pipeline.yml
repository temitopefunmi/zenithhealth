name: Zenith Health - Production Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1️⃣ LOGIN (OIDC - No Secrets/JSON needed)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2️⃣ INFRASTRUCTURE
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="resource_group_name=rg-zenith-mgmt" \
            -backend-config="key=terraform.tfstate"
          
          terraform apply -auto-approve

      # 3️⃣ BUILD
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      # 4️⃣ THE SURGICAL ZIP (This fixes the MODULE_NOT_FOUND error)
      - name: Prepare Staging Folder
        run: |
          mkdir -p deploy_staging
          cp -r .next/standalone/* ./deploy_staging/
          cp -r public ./deploy_staging/public || true
          mkdir -p ./deploy_staging/.next
          cp -r .next/static ./deploy_staging/.next/static
          
      - name: Create Package
        run: |
          cd deploy_staging
          zip -r ../deploy.zip .
          echo "Verify: server.js should be at the TOP of this list:"
          unzip -l ../deploy.zip | head -n 10

      # -----------------------------
      # 5️⃣ Deploy to Azure
      # -----------------------------
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_NAME }}
          package: deploy.zip