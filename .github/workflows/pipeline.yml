name: Zenith Health - Production Pipeline

on:
  push:
    branches: [main]
    # 🎯 Added Path Filtering to save time
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'package*.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      # 🔐 This allows Terraform to pass the app_name variable automatically
      TF_VAR_app_name: ${{ vars.APP_NAME }}
    environment: Production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1️⃣ LOGIN
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect OpenAI account
        id: check_account
        run: |
          ACCOUNT_NAME=$(az cognitiveservices account list \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?kind=='OpenAI'].name" -o tsv)

          if [ -z "$ACCOUNT_NAME" ]; then
            echo "account_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No OpenAI account found yet. Skipping model check."
          else
            echo "account_exists=true" >> $GITHUB_OUTPUT
            echo "account_name=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
          fi
      - name: Verify model availability
        if: steps.check_account.outputs.account_exists == 'true'
        run: |
          MODEL_NAME="${{ vars.MODEL_NAME }}"
          ACCOUNT_NAME="${{ steps.check_account.outputs.account_name }}"

          MODEL_FOUND=$(az cognitiveservices account list-models \
            --name $ACCOUNT_NAME \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?name=='$MODEL_NAME'].name" -o tsv)

          if [ -z "$MODEL_FOUND" ]; then
            echo "❌ Model $MODEL_NAME not available"
            exit 1
          fi

          echo "✅ Model is available"

      # 2️⃣ INFRASTRUCTURE
      # Compile Bicep to JSON so Terraform can find it
      - name: Compile Bicep
        run: az bicep build --file ./scripts/sql_db.bicep --outfile ./terraform/sql_db.json
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init 
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="resource_group_name=rg-zenith-mgmt" \
            -backend-config="key=terraform.tfstate"
      
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan 

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply tfplan
          # Terraform will now create the SQL DB, Key Vault, and Managed Identity

      # 3️⃣ BUILD (Standard Next.js Build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        run: |
          npm ci --legacy-peer-deps
          npm run build

      # 4️⃣ PREPARE PACKAGE
      - name: Prepare Staging Folder
        run: |
          mkdir -p deploy_staging
          cp -r .next/standalone/. ./deploy_staging/
          cp -r public ./deploy_staging/public || true
          mkdir -p ./deploy_staging/.next
          cp -r .next/static ./deploy_staging/.next/static
          
      - name: Create Package
        run: |
          cd deploy_staging
          zip -r ../deploy.zip .

      # 5️⃣ DEPLOY
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_NAME }}
          package: deploy.zip