name: Zenith Health - Production Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- SECTION 1: INFRASTRUCTURE (TERRAFORM) ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug Secret Connectivity
        # This step helps us see if the secrets are even reaching the runner
        run: |
          echo "Checking secret presence..."
          if [ -z "$ARM_CLIENT_ID" ]; then echo "CLIENT_ID is EMPTY"; else echo "CLIENT_ID length is ${#ARM_CLIENT_ID}"; fi
          if [ -z "$ARM_TENANT_ID" ]; then echo "TENANT_ID is EMPTY"; else echo "TENANT_ID length is ${#ARM_TENANT_ID}"; fi
          if [ -z "$ARM_CLIENT_SECRET" ]; then echo "SECRET is EMPTY"; else echo "SECRET length is ${#ARM_CLIENT_SECRET}"; fi
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Terraform Init
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Single quotes protect the ~ character from being interpreted by the shell
          ARM_CLIENT_SECRET: '${{ secrets.AZURE_CLIENT_SECRET }}'
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: '${{ secrets.AZURE_CLIENT_SECRET }}'
        run: terraform apply -auto-approve

      # --- SECTION 2: APPLICATION BUILD ---
      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js App
        run: npm run build

      # --- SECTION 3: DEPLOYMENT ---
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip for Deployment
        run: zip -r deploy.zip .next node_modules package.json public next.config.js

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zht-portal-web' 
          package: deploy.zip